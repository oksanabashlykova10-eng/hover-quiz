<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Quiz: Editor by English Bootcamp</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #1e1e2f;
            --panel-bg: #2a2a40;
            --text: #ffffff;
            --tablet: #ff7e67;
            --slot-bg: #3f3f5a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .editor-sidebar {
            width: 320px;
            background-color: var(--panel-bg);
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .emblem {
            width: 150px;
            height: 150px;
            background-color: #fff;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 4px solid var(--primary);
        }

        .emblem img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.9rem;
            color: #ccc;
        }

        input[type="text"], input[type="color"], input[type="number"] {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #1e1e2f;
            color: white;
            font-size: 1rem;
        }
        
        /* Стили для поля с iframe */
        textarea {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #1e1e2f;
            color: #00ffcc;
            font-size: 0.9rem;
            font-family: monospace;
            resize: vertical;
            min-height: 80px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #357abd;
        }

        .preview-area {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .slots-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            min-height: 60px;
        }

        .slot {
            width: 60px;
            height: 60px;
            background-color: var(--slot-bg);
            border: 2px dashed #777;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #777;
            transition: all 0.3s;
        }

        .game-area {
            flex: 1;
            position: relative;
            border: 2px solid #444;
            border-radius: 10px;
            overflow: hidden;
            background: radial-gradient(circle, #2a2a40 0%, #1e1e2f 100%);
        }

        .tablet {
            width: 50px;
            height: 50px;
            background-color: var(--tablet);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            position: absolute;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: transform 0.2s;
            user-select: none;
        }

        .tablet:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="editor-sidebar">
        <div class="header">
            <div class="emblem">
                <img src="" alt="English Bootcamp Logo" id="logo-preview" style="display: none;">
            </div>
            <h1>Hover Quiz: Editor<br><small style="font-size: 0.7rem; color: #aaa;">by English Bootcamp</small></h1>
        </div>

        <div class="form-group">
            <label for="logo-url">URL вашей эмблемы (картинка):</label>
            <input type="text" id="logo-url" placeholder="https://..." value="">
        </div>
        
        <div class="form-group">
            <label for="question-count">Количество вопросов:</label>
            <input type="number" id="question-count" min="1" max="20" value="8">
        </div>

        <div class="form-group">
            <label for="tablet-color">Цвет табличек:</label>
            <input type="color" id="tablet-color" value="#ff7e67">
        </div>
        
        <div class="form-group">
            <label for="github-repo">Название репозитория на GitHub (для iframe):</label>
            <input type="text" id="github-repo" placeholder="например: hover-quiz" value="">
        </div>

        <div class="form-group">
            <label for="iframe-code">Код для Genially:</label>
            <textarea id="iframe-code" readonly><iframe src="https://oksanabashlykova10-eng.github.io/ИМЯ_РЕПОЗИТОРИЯ/" width="100%" height="700" style="border:none; border-radius: 10px;" allowfullscreen></iframe></textarea>
        </div>

        <button id="update-btn">Применить настройки</button>
    </div>

    <div class="preview-area" id="preview-area">
        <div class="slots-container" id="slots-container">
            </div>

        <div class="game-area" id="game-area">
            </div>
    </div>

    <script>
        const updateBtn = document.getElementById('update-btn');
        const logoUrlInput = document.getElementById('logo-url');
        const logoPreview = document.getElementById('logo-preview');
        const tabletColorInput = document.getElementById('tablet-color');
        const questionCountInput = document.getElementById('question-count');
        const slotsContainer = document.getElementById('slots-container');
        const gameArea = document.getElementById('game-area');
        const githubRepoInput = document.getElementById('github-repo');
        const iframeCodeTextarea = document.getElementById('iframe-code');

        function updateGame() {
            // Обновление логотипа
            if (logoUrlInput.value) {
                logoPreview.src = logoUrlInput.value;
                logoPreview.style.display = 'block';
            } else {
                logoPreview.style.display = 'none';
            }

            // Обновление цвета
            document.documentElement.style.setProperty('--tablet', tabletColorInput.value);

            // Обновление iframe кода
            const repoName = githubRepoInput.value.trim() || "ИМЯ_РЕПОЗИТОРИЯ";
            iframeCodeTextarea.value = `<iframe src="https://oksanabashlykova10-eng.github.io/${repoName}/" width="100%" height="700" style="border:none; border-radius: 10px;" allowfullscreen></iframe>`;

            // Очистка старых слотов и табличек
            slotsContainer.innerHTML = '';
            gameArea.innerHTML = '';

            const count = parseInt(questionCountInput.value) || 8;

            for (let i = 1; i <= count; i++) {
                // Создаем слот
                const slot = document.createElement('div');
                slot.className = 'slot';
                slotsContainer.appendChild(slot);

                // Создаем табличку
                const tablet = document.createElement('div');
                tablet.className = 'tablet';
                tablet.textContent = i;
                
                // Рандомная позиция
                tablet.style.left = Math.floor(Math.random() * 80) + 10 + '%';
                tablet.style.top = Math.floor(Math.random() * 70) + 10 + '%';
                
                gameArea.appendChild(tablet);
            }
        }

        updateBtn.addEventListener('click', updateGame);
        
        // Запускаем один раз при загрузке, чтобы отрисовать начальные 8 штук
        updateGame();
    </script>
</body>
</html>
